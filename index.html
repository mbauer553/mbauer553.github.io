<html>
    <head>
        <style>
            button {
                margin: 0.5%;
            }
            .controls {
                margin: 0.5%;
                text-align: center;
            }
            .center-text {
                text-align: center;
                color: #4d4d4d;
            }
            .scene-container {
                margin: auto;
                border: solid #4d4d4d;
                width: 90%;
                height: 80%;
            }
            .graph-container {
                border-right: solid #4d4d4d;
                float: left;
                width: 66%;
                height: 100%;
            }
            .scene-context {
                width: 99.5%;
                position: relative;
                left: 0.5%;
                flex-grow: 1;
                height: 100%;
            }
        </style>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js" integrity="sha512-vc58qvvBdrDR4etbxMdlTt4GBQk1qjvyORR2nrsPsFPyrs+/u5c3+1Ct6upOgdZoIl7eq6k3a1UPDSNAQi/32A==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script>
            const usCode = 'USA';
            const birthRateCode = 'SP.DYN.CBRT.IN';
            const deathRateCode = 'SP.DYN.CDRT.IN';
            const migrationCode = 'SM.POP.NETM';
            const populationGrowthCode = 'SP.POP.GROW';
            const strokeWidth = 1.5;
            const backId = '#back';
            const nextId = '#next';
            const sceneTextContentId = '#scene-text-content';
            const selectContainerId = '#selectContainer';
            const countrySelectId = '#countrySelect';
            const codeSelectId = '#codeSelect';
            const years = [
                1965,
                1970,
                1975,
                1980,
                1985,
                1990,
                1995,
                2000,
                2005,
                2010,
                2015,
                2020,
                2021,
                2022,
            ];

            let data;
            let currSceneIndex = 0;

            async function getData() {
                return d3.csv('https://raw.githubusercontent.com/mbauer553/mbauer553.github.io/main/data.csv');
            }
            
            function parseDataForVis(data, countryCode, seriesCode) {
                let dataObj = data.find(d => d.CountryCode == countryCode && d.SeriesCode == seriesCode)
                let valuesByYear = [];
                years.forEach((year) => {
                    let dataForYear = dataObj[String(year)];
                    if(dataForYear != '..'){
                        valuesByYear.push({
                            year,
                            value: Number(dataForYear)
                        })
                    }
                }
                );
                return {
                    countryCode: dataObj.CountryCode,
                    countryName: dataObj.CountryName,
                    seriesName: dataObj.SeriesName,
                    seriesCode: dataObj.SeriesCode,
                    valueByYear: valuesByYear,
                }
            }

            function updateSceneThree() {
                let graphSelect = d3.select('#graph');
                graphSelect.html('');
                graphSelect
                .append('svg')
                .attr('height', '100%')
                .attr('width', '100%')
                .attr('id', 'graph-svg');

                let boundingRect = graphSelect.node().getBoundingClientRect();

                let margin = boundingRect.height * .125;
                let graphHeight = boundingRect.height - margin;
                let x = d3.scaleTime().domain([new Date(String(`${years[0]}-01-01`)), new Date(String(`${years[years.length-1]}-01-01`))]).range([0, boundingRect.width-2*margin]);

                let svgSelect = graphSelect.select('svg');

                svgSelect
                .append('g')
                .attr('transform', `translate(${margin}, ${graphHeight})`)
                .call(d3.axisBottom(x));

                let maxY;
                let y;

                let sceneData = parseDataForVis(
                    data,
                    d3.select(countrySelectId).node().value,
                    d3.select(codeSelectId).node().value
                );

                maxY = Math.max(...sceneData.valueByYear.map((vby)=>vby.value));
                minY = Math.min(...sceneData.valueByYear.map((vby)=>vby.value));
                y = d3.scaleLinear().domain([minY, maxY]).range([graphHeight-margin, 0]);

                let lineColor;
                if(d3.select(codeSelectId).node().value == deathRateCode){
                    lineColor = 'orange'
                } else {
                    lineColor = 'steelblue'
                }

                svgSelect.append('path')
                .datum(sceneData.valueByYear)
                .attr('transform', `translate(${margin}, ${margin})`)
                .attr('fill', 'none')
                .attr('stroke', lineColor)
                .attr('stroke-width', strokeWidth)
                .attr(
                    'd',
                    d3.line()
                    .x((vby) => x(new Date(String(`${vby.year}-01-01`))))
                    .y((vby) => y(vby.value))
                );

                svgSelect
                .append('g')
                .attr('transform', `translate(${margin}, ${margin})`)
                .call(d3.axisLeft(y));
            }

            function loadScene(sceneIndex){
                let graphSelect = d3.select('#graph');

                let selectContainer = d3.select(selectContainerId);

                if(sceneIndex == 0){
                    d3.select(backId).attr('disabled', 'true');
                } else {
                    d3.select(backId).attr('disabled', null);
                }

                if(sceneIndex == 3){
                    d3.select(nextId).attr('disabled', 'true');
                    selectContainer.style('visibility', 'visible');
                    d3.select(sceneTextContentId).text("Now that we have looked at these statistics for the US, please some other countries for your own context!");
                } else {
                    d3.select(nextId).attr('disabled', null);
                    selectContainer.style('visibility', 'hidden');
                    graphSelect.html('');

                    graphSelect
                    .append('svg')
                    .attr('height', '100%')
                    .attr('width', '100%')
                    .attr('id', 'graph-svg');

                    let boundingRect = graphSelect.node().getBoundingClientRect();

                    let margin = boundingRect.height * .125;
                    let graphHeight = boundingRect.height - margin;
                    let x = d3.scaleTime().domain([new Date(String(`${years[0]}-01-01`)), new Date(String(`${years[years.length-1]}-01-01`))]).range([0, boundingRect.width-2*margin]);

                    let svgSelect = graphSelect.select('svg');

                    svgSelect
                    .append('g')
                    .attr('transform', `translate(${margin}, ${graphHeight})`)
                    .call(d3.axisBottom(x));
                    let maxY;
                    let y;

                    switch (sceneIndex) {
                        case 0:
                            let usBirthRateData = parseDataForVis(data, usCode, birthRateCode);
                            let usDeathRateData = parseDataForVis(data, usCode, deathRateCode);

                            maxY = Math.ceil(Math.max(...usBirthRateData.valueByYear.concat(usDeathRateData.valueByYear).map((vby)=>vby.value)));
                            y = d3.scaleLinear().domain([0, maxY]).range([graphHeight-margin, 0]);

                            svgSelect.append('path')
                            .datum(usBirthRateData.valueByYear)
                            .attr('transform', `translate(${margin}, ${margin})`)
                            .attr('fill', 'none')
                            .attr('stroke', 'steelblue')
                            .attr('stroke-width', strokeWidth)
                            .attr(
                                'd',
                                d3.line()
                                .x((vby) => x(new Date(String(`${vby.year}-01-01`))))
                                .y((vby) => y(vby.value))
                            );

                            svgSelect.append('path')
                            .datum(usDeathRateData.valueByYear)
                            .attr('transform', `translate(${margin}, ${margin})`)
                            .attr('fill', 'none')
                            .attr('stroke', 'orange')
                            .attr('stroke-width', strokeWidth)
                            .attr(
                                'd',
                                d3.line()
                                .x((vby) => x(new Date(String(`${vby.year}-01-01`))))
                                .y((vby) => y(vby.value))
                            );
                            d3.select(sceneTextContentId).text("A country's population growth is of importance, because as populations age, it is important to have enough individuals in the next generation to support the needs of those in the previous one.  We will first take a look at a few visuals to show relevant data on this topic for the United States.  Starting off, in blue we see the US birth rate over time, and in orange, we see the death rate.  Both numbers are per 1000 people.  ");
                            break;
                        case 1:
                            let usNetMigrationData = parseDataForVis(data, usCode, migrationCode);
                            maxY = Math.max(...usNetMigrationData.valueByYear.map((vby)=>vby.value));
                            y = d3.scaleLinear().domain([0, maxY]).range([graphHeight-margin, 0]);

                            svgSelect.append('path')
                            .datum(usNetMigrationData.valueByYear)
                            .attr('transform', `translate(${margin}, ${margin})`)
                            .attr('fill', 'none')
                            .attr('stroke', 'steelblue')
                            .attr('stroke-width', strokeWidth)
                            .attr(
                                'd',
                                d3.line()
                                .x((vby) => x(new Date(String(`${vby.year}-01-01`))))
                                .y((vby) => y(vby.value))
                            );
                            d3.select(sceneTextContentId).text("Next, we observe the net migration of people into the United States in number of people.  ");
                            break;
                        case 2:
                            let usPopulationGrowthData = parseDataForVis(data, usCode, populationGrowthCode);
                            maxY = Math.max(...usPopulationGrowthData.valueByYear.map((vby)=>vby.value));

                            y = d3.scaleLinear().domain([0, maxY]).range([graphHeight-margin, 0]);

                            svgSelect.append('path')
                            .datum(usPopulationGrowthData.valueByYear)
                            .attr('transform', `translate(${margin}, ${margin})`)
                            .attr('fill', 'none')
                            .attr('stroke', 'steelblue')
                            .attr('stroke-width', strokeWidth)
                            .attr(
                                'd',
                                d3.line()
                                .x((vby) => x(new Date(String(`${vby.year}-01-01`))))
                                .y((vby) => y(vby.value))
                            );

                            d3.select(sceneTextContentId).text("What the information that the previous two graphs influence is this graph of US population growth, shown as a percentage of the total population.  ");

                            break;
                        default:
                            console.log('Something went wrong...');
                            break;
                    }

                    svgSelect
                    .append('g')
                    .attr('transform', `translate(${margin}, ${margin})`)
                    .call(d3.axisLeft(y));
                }
            }

            async function initialize() {
                data = await getData();
                d3.select(nextId).on('click', function(){
                    currSceneIndex = currSceneIndex + 1;
                    loadScene(currSceneIndex);
                });
                d3.select(backId).on('click', function(){
                    currSceneIndex = currSceneIndex - 1;
                    loadScene(currSceneIndex);
                })

                let uniqueCountryObj = {};
                data.forEach(
                    function(d){
                        uniqueCountryObj[d.CountryCode] = d.CountryName
                    }
                );

                d3.select(countrySelectId)
                .selectAll('option')
                .data(Object.keys(uniqueCountryObj))
                .enter()
                .append('option')
                .attr('value', (d) => d)
                .text((d) => uniqueCountryObj[d]);

                d3.select(countrySelectId)
                .selectAll('option')
                .filter(function(){
                    return d3.select(this).attr('value') == usCode
                }).attr('selected', 'true');

                loadScene(currSceneIndex);
            }
            window.onload = initialize;
        </script>
    </head>
    <body>
        <div>
            <h1 class="center-text">Population Growth Factors for the US and Others</h1>
        </div>
        <div class="center-text">
            <p>
                Data Obtained from: <a href="https://databank.worldbank.org/source/world-development-indicators">World Development Indicators</a>
                <br />
                Last Updated: 06/28/2024 
            </p>
        </div>
        <div class="scene-container">
            <div id="graph" class="graph-container"></div>
            <div class="scene-context">
                <div class="controls">
                    <div id="selectContainer">
                        Statistic: 
                        <select id="codeSelect" onchange="updateSceneThree();">
                            <option value="SP.DYN.CBRT.IN">Birth Rate</option>
                            <option value="SP.DYN.CDRT.IN">Death Rate</option>
                            <option value="SM.POP.NETM">Net Migration</option>
                            <option selected value="SP.POP.GROW">Population Growth</option>
                        </select>
                        Country: 
                        <select id="countrySelect" onchange="updateSceneThree();"></select>
                    </div>
                    <div><button id="back">Back</button><button id="next">Next</button></div>
                </div>
                <div><p id="scene-text-content"></p></div>
            </div>
        </div>
    </body>
</html>
